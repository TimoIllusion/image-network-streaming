name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (lightweight) dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,test]" --no-deps
          python -m pip install \
            fastapi \
            httpx \
            numpy \
            opencv-python-headless \
            pillow \
            pytest \
            pytest-asyncio \
            requests \
            ruff

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: |
          pytest -q

