name: Auto-tag

# Bumps the patch version on every push to main. Include "#minor" or "#major"
# anywhere in a commit message on the merged range to request a larger bump.
# Skip tagging for a push by including "#none" or "[skip ci]" in the message.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@e528bc2b9628971ce0e6f823f3052d1dcd9d512c  # 1.73.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          INITIAL_VERSION: 0.1.0
