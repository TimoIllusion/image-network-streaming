<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Webcam Object Detection</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 1200px; }
      h1 { margin-top: 0; }
      .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
      select, button, label { font-size: 1rem; }
      select:disabled { color: #888; }
      table { border-collapse: collapse; margin: 0.5rem 0 1rem; font-variant-numeric: tabular-nums; }
      th, td { border: 1px solid #ccc; padding: 0.25rem 0.5rem; text-align: right; }
      th:first-child, td:first-child { text-align: left; }
      #video { width: 100%; max-width: 960px; background: #000; }
      .hint { color: #666; font-style: italic; }
    </style>
  </head>
  <body>
    <h1>Webcam Object Detection</h1>

    <div class="controls">
      <label>Backend: <select id="backend"></select></label>
      <label><input type="checkbox" id="infer" /> Enable object detection</label>
      <button id="clear">Clear results</button>
    </div>

    <div id="stats-wrap">
      <div id="stats"></div>
    </div>

    <img id="video" src="/video_feed" alt="live webcam feed" />

    <script src="/static/app.js"></script>
  </body>
</html>
